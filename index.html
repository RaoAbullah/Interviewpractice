<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Practice Tool - Master Your Interview Skills</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="setupContainer" class="setup-container">
    <div class="setup-content">
      <div class="logo-section">
        <h1 class="main-title">
          <span class="icon">🎥</span>
          <span>InterviewPractice</span>
        </h1>
        <p class="subtitle">Practice interviews the way they actually happen</p>
      </div>

      <form id="setupForm" class="form-section">
        <div class="form-group">
          <label for="jobDescription">Job Description</label>
          <textarea 
            id="jobDescription" 
            placeholder="Paste the job description here... This helps us customize questions for your role."
            required
          ></textarea>
          <span class="hint">📋 The more details, the more personalized your questions</span>
        </div>

        <div class="form-group">
          <label for="questionCount">Number of Questions</label>
          <select id="questionCount">
            <option value="5">5 Questions (Quick Practice)</option>
            <option value="10">10 Questions (Standard)</option>
            <option value="20">20 Questions (Comprehensive)</option>
            <option value="30">30 Questions (Full Session)</option>
          </select>
        </div>

        <button id="startBtn" class="start-button" type="button">
          <span>Start Interview</span>
          <span class="arrow">→</span>
        </button>
      </form>

      <div class="features">
        <div class="feature">
          <span class="feature-icon">⏱️</span>
          <span>30 sec per question</span>
        </div>
        <div class="feature">
          <span class="feature-icon">🎤</span>
          <span>Video + Audio</span>
        </div>
        <div class="feature">
          <span class="feature-icon">💾</span>
          <span>Auto download</span>
        </div>
      </div>
    </div>
  </div>

  <div id="countdownOverlay" class="countdown-overlay" style="display:none;">
    <div class="countdown-inner">
      <div class="countdown-number" id="countdownNumber">3</div>
      <p class="countdown-text">Get Ready!</p>
    </div>
  </div>

  <div id="interviewSection" class="interview-container" style="display:none;">
    <div class="interview-header">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div class="interview-stats">
        <span id="questionCounter" class="stat">Q 1/10</span>
        <span id="recordingStatus" class="recording-badge">● REC</span>
      </div>
    </div>

    <div class="interview-content">
      <div class="video-container">
        <video id="preview" autoplay muted playsinline></video>
        <div class="timer-badge">
          <span id="timer">30</span>s
        </div>
      </div>

      <div class="question-container">
        <h2 id="questionText" class="question-text"></h2>
        <p id="statusText" class="status-message"></p>
      </div>
    </div>

    <div class="interview-footer">
      <div class="audio-waves" id="audioWaves">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
